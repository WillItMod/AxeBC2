name: Publish BitcoinII Core image

on:
  push:
    branches:
      - main
    tags:
      - "*"
    paths:
      - "willitmod-dev-btc2/data/bitcoiniid/**"
      - ".github/workflows/publish-bitcoinii-core.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to BITCOINII_VERSION in Dockerfile)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(awk -F= '/^ARG BITCOINII_VERSION=/{gsub(/\r/,"",$2); print $2; exit}' willitmod-dev-btc2/data/bitcoiniid/Dockerfile)"
          fi
          if [ -z "$TAG" ]; then
            echo "Failed to compute tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: willitmod-dev-btc2/data/bitcoiniid
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/willitmod/bitcoinii-core:${{ steps.meta.outputs.tag }}

      - name: Ensure package is public (best effort)
        continue-on-error: true
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          PACKAGE="bitcoinii-core"

          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}" \
            -d '{"visibility":"public"}' >/dev/null || true

          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/user/packages/container/${PACKAGE}" \
            -d '{"visibility":"public"}' >/dev/null || true
