manifestVersion: 1
id: axebtc2
category: bitcoin
name: AxeBC2
version: "0.1.1-dev"
tagline: BC2 node + solo pool
description: >-
  Run a BitcoinII (BC2) full node and a solo Stratum v1 pool (ckpool) as a single app.


  Miner connection:
    - URL: `stratum+tcp://<your-host-ip>:2345`
    - Username: worker name (optional)
    - Password: anything


  Notes:
    - Payout address must be a BC2 address (same format as Bitcoin: `bc1...` / `1...` / `3...`).
    - ALPHA: expect breaking changes while this is being tested on 5tratumOS.
developer: WillItMod
website: https://github.com/WillItMod/AxeBTC2_Release
repo: https://github.com/WillItMod/AxeBTC2_Release
support: https://github.com/WillItMod/AxeBTC2_Release/issues
dependencies: []
port: 21219
icon: https://raw.githubusercontent.com/WillItMod/AxeBTC2_Release/main/willitmod-dev-btc2/icon.png
gallery:
  - https://raw.githubusercontent.com/WillItMod/AxeBTC2_Release/main/willitmod-dev-btc2/icon.png
path: ""
defaultUsername: ""
defaultPassword: ""
widgets:
  - id: "sync"
    type: "text-with-progress"
    refresh: "5s"
    endpoint: "app:3000/api/widget/sync"
    link: ""
    example:
      type: "text-with-progress"
      link: ""
      title: "BC2 sync"
      text: "83%"
      progressLabel: "In progress"
      progress: 0.83
  - id: "pool"
    type: "three-stats"
    refresh: "30s"
    endpoint: "app:3000/api/widget/pool"
    link: ""
    example:
      type: "three-stats"
      link: ""
      items:
        - title: "Hashrate"
          text: "1.2"
          subtext: "TH/s"
        - title: "Workers"
          text: "2"
        - title: "Best Share"
          text: "1.23T"
backupIgnore:
  - data/node/blocks
  - data/node/chainstate
  - data/node/indexes
submitter: WillItMod
